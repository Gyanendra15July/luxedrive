<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | LUXEDRIVE</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .profile-container {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .profile-sidebar {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2rem;
            text-align: center;
            height: fit-content;
        }

        .profile-photo {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--primary);
            margin: 0 auto 1rem;
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.3);
        }

        .upload-btn-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            margin-bottom: 2rem;
        }

        .upload-btn-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }

        .profile-main {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem;
        }

        .sec-title {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            color: var(--light);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .otp-group {
            display: none;
            background: rgba(59, 130, 246, 0.1);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--primary);
            margin-top: 1rem;
        }

        .booking-history {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid var(--glass-border);
        }

        .history-card {
            background: var(--dark-accent);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition);
        }
        .history-card:hover { border-color: var(--primary); }

        .status-badge {
            padding: 0.4rem 1rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
        }
        .status-confirmed { background: rgba(16, 185, 129, 0.2); color: #34d399; }
        .status-cancelled { background: rgba(239, 68, 68, 0.2); color: #f87171; }

        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.5);
            color: #f87171;
            margin-top: 2rem;
        }
        .btn-danger:hover {
            background: #ef4444;
            color: white;
        }

        @media(max-width: 900px) {
            .profile-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body class="auth-page" style="justify-content: flex-start; padding-top: 100px;">
    <nav>
        <div class="logo"><a href="/">LUXEDRIVE</a></div>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/cars">Cars</a></li>
            <li><a href="/dashboard">Dashboard</a></li>
        </ul>
        <div class="nav-btns" id="nav-auth-btns"></div>
    </nav>

    <div class="section-padding" style="padding-top: 40px;">
        <div class="profile-container fade-in">
            
            <!-- Left Sidebar -->
            <div class="profile-sidebar">
                <img src="https://via.placeholder.com/150" alt="Profile" id="displayProfileImg" class="profile-photo">
                <div class="upload-btn-wrapper">
                    <button class="btn btn-outline btn-sm"><i class="fas fa-camera"></i> Change Photo</button>
                    <input type="file" id="photoUpload" accept="image/*" onchange="handlePhotoUpload(event)" />
                </div>
                <h3 id="displayName" style="margin-bottom: 0.5rem; font-size: 1.8rem;">---</h3>
                <p id="displayEmail" style="color: var(--gray); margin-bottom: 2rem;">---</p>
                <button class="btn btn-danger full-width" onclick="handleDeleteAccount()">
                    <i class="fas fa-trash-alt"></i> Delete Account
                </button>
            </div>

            <!-- Right Main Area -->
            <div class="profile-main">
                <h2 class="sec-title"><i class="fas fa-user-edit"></i> Account Details</h2>
                
                <form id="profileForm" onsubmit="handleProfileUpdate(event)">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="profileName" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Mobile Number (Changing requires OTP)</label>
                        <div style="display: flex; gap: 1rem;">
                            <input type="tel" id="profileMobile" required>
                            <button type="button" id="sendOtpBtn" class="btn btn-outline" style="white-space: nowrap;" onclick="initiateMobileChange()">Change Mobile</button>
                        </div>
                    </div>

                    <div class="otp-group" id="otpGroup">
                        <label style="color: var(--primary-light);">Enter 6-Digit OTP sent to your new number</label>
                        <div style="display: flex; gap: 1rem;">
                            <input type="text" id="otpInput" placeholder="••••••" maxlength="6">
                            <button type="button" class="btn btn-primary" onclick="verifyMobileOtp()">Verify & Save</button>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">Save Changes</button>
                </form>

                <!-- Booking History Sub-section -->
                <div class="booking-history">
                    <h2 class="sec-title"><i class="fas fa-history"></i> Booking History</h2>
                    <div id="historyList">
                        <p style="color: var(--gray);">Loading history...</p>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="/js/script.js"></script>
    <script>
        let currentMobile = '';

        async function loadProfileData() {
            const token = localStorage.getItem('token');
            if(!token) return window.location.href = '/login';

            try {
                // Load User Data
                const res = await fetch('/api/user/profile', { headers: { 'Authorization': `Bearer ${token}` }});
                if(!res.ok) throw new Error('Session Expired');
                const user = await res.json();
                
                document.getElementById('profileName').value = user.name;
                document.getElementById('profileMobile').value = user.mobile;
                document.getElementById('displayName').innerText = user.name;
                document.getElementById('displayEmail').innerText = user.email;
                if(user.profile_image) document.getElementById('displayProfileImg').src = user.profile_image;
                currentMobile = user.mobile;
                
                // Load History
                loadHistory(token);
            } catch (err) {
                console.error(err);
                logout();
            }
        }

        async function loadHistory(token) {
            const list = document.getElementById('historyList');
            try {
                const res = await fetch('/api/bookings', { headers: { 'Authorization': `Bearer ${token}` }});
                const bookings = await res.json();

                if(!bookings.length) {
                    list.innerHTML = '<p style="color: var(--gray);">You have no past bookings.</p>';
                    return;
                }

                list.innerHTML = bookings.map(b => {
                    const statusClass = b.status === 'Cancelled' ? 'status-cancelled' : 'status-confirmed';
                    const canCancel = b.status !== 'Cancelled' && new Date(b.pickup_date) > new Date();
                    
                    return `
                    <div class="history-card">
                        <div>
                            <h3 style="margin-bottom: 0.5rem;">${b.car_name}</h3>
                            <p style="color: var(--gray); font-size: 0.9rem; margin-bottom: 0.5rem;">
                                <i class="fas fa-calendar-alt"></i> ${new Date(b.pickup_date).toLocaleDateString()} - ${new Date(b.return_date).toLocaleDateString()}
                            </p>
                            <p style="color: var(--gray); font-size: 0.9rem;">
                                <i class="fas fa-map-marker-alt" style="color: var(--primary);"></i> ${b.pickup_location}
                            </p>
                        </div>
                        <div style="text-align: right;">
                            <div class="status-badge ${statusClass}" style="margin-bottom: 1rem; display: inline-block;">${b.status}</div>
                            <h3 style="color: var(--primary);">$${b.total_price}</h3>
                            ${canCancel ? `<button class="btn btn-outline" style="padding: 0.4rem 0.8rem; font-size: 0.8rem; margin-top: 0.5rem;" onclick="cancelBooking(${b.id})">Cancel</button>` : ''}
                        </div>
                    </div>
                `}).join('');
            } catch (err) {
                list.innerHTML = '<p style="color: #f87171;">Failed to load booking history.</p>';
            }
        }

        async function handleProfileUpdate(e) {
            e.preventDefault();
            const token = localStorage.getItem('token');
            const name = document.getElementById('profileName').value;
            
            try {
                const res = await fetch('/api/user/update', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ name })
                });
                
                if(res.ok) {
                    alert('Profile updated successfully!');
                    localStorage.setItem('name', name);
                    checkAuth();
                    loadProfileData();
                }
            } catch(err) { alert('Update failed'); }
        }

        async function initiateMobileChange() {
            const newMobile = document.getElementById('profileMobile').value;
            if (newMobile === currentMobile) return alert('This is already your current number.');
            
            const token = localStorage.getItem('token');
            try {
                const res = await fetch('/api/user/send-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ mobile: newMobile })
                });
                const data = await res.json();
                if(res.ok) {
                    alert(data.message);
                    document.getElementById('otpGroup').style.display = 'block';
                    document.getElementById('sendOtpBtn').innerText = 'Resend OTP';
                } else alert(data.message);
            } catch (err) { alert('Error sending OTP'); }
        }

        async function verifyMobileOtp() {
            const newMobile = document.getElementById('profileMobile').value;
            const otp = document.getElementById('otpInput').value;
            const token = localStorage.getItem('token');

            if(otp.length !== 6) return alert('Enter valid 6-digit OTP');

            try {
                const res = await fetch('/api/user/verify-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ mobile: newMobile, otp })
                });
                const data = await res.json();
                if(res.ok) {
                    alert('Mobile verified successfully!');
                    document.getElementById('otpGroup').style.display = 'none';
                    currentMobile = newMobile;
                } else alert(data.message);
            } catch (err) { alert('OTP verification failed'); }
        }

        async function handlePhotoUpload(e) {
            const file = e.target.files[0];
            if(!file) return;

            const formData = new FormData();
            formData.append('profile_image', file);
            
            const token = localStorage.getItem('token');
            try {
                const res = await fetch('/api/user/upload-photo', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });
                const data = await res.json();
                if(res.ok) {
                    document.getElementById('displayProfileImg').src = data.profile_image;
                    alert('Photo updated successfully');
                } else alert(data.message);
            } catch (err) { alert('Upload failed'); }
        }

        async function cancelBooking(id) {
            if(!confirm('Are you sure you want to cancel this booking? This action cannot be reversed.')) return;
            
            const token = localStorage.getItem('token');
            try {
                const res = await fetch(`/api/bookings/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if(res.ok) {
                    alert('Booking cancelled.');
                    loadHistory(token);
                } else alert(data.message);
            } catch (err) { alert('Failed to cancel the booking'); }
        }

        async function handleDeleteAccount() {
            if(!confirm('DANGER: Are you absolutely sure you want to delete your account? All history will be lost!')) return;

            const token = localStorage.getItem('token');
            try {
                const res = await fetch('/api/user/delete', {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if(res.ok) {
                    alert('Account deleted successfully.');
                    logout();
                }
            } catch (err) { alert('Failed to delete account'); }
        }

        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            loadProfileData();
        });
    </script>
</body>
</html>
