<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | LUXEDRIVE</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .profile-wrap {
            max-width: 1000px;
            margin: 2rem auto;
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
            padding: 0 1.5rem;
        }

        .profile-side {
            background: var(--white);
            border-radius: var(--radius);
            padding: 2rem;
            text-align: center;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            height: fit-content;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 1.25rem;
            border: 3px solid var(--primary-light);
            background: var(--surface);
        }

        .profile-info h3 { font-size: 1.4rem; font-weight: 800; color: var(--dark); margin-bottom: .25rem; }
        .profile-info p { color: var(--text-muted); font-size: .9rem; margin-bottom: 2rem; }

        .profile-main-area {
            background: var(--white);
            border-radius: var(--radius);
            padding: 2rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
        }

        .section-h {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 1.5rem;
            padding-bottom: .75rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: .5rem;
        }

        .booking-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background: var(--surface);
            border-radius: var(--radius-sm);
            margin-bottom: .75rem;
            border: 1px solid var(--border);
        }

        .booking-details h4 { font-size: 1rem; margin-bottom: .25rem; }
        .booking-details p { font-size: .85rem; color: var(--text-muted); }

        .booking-status { text-align: right; }
        .booking-status .price { font-weight: 800; color: var(--primary); font-size: 1.1rem; margin-bottom: .35rem; }

        @media (max-width: 768px) {
            .profile-wrap { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<nav>
    <div class="logo"><a href="/">LUXEDRIVE</a></div>
    <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/cars">Fleet</a></li>
        <li><a href="/contact">Contact</a></li>
    </ul>
    <div class="nav-btns" id="nav-auth-btns">
        <!-- JS Managed -->
    </div>
</nav>

<div class="page-header">
    <h1>👤 My Profile</h1>
    <p>Manage your account settings and view booking history.</p>
</div>

<div class="profile-wrap reveal">
    <!-- Sidebar -->
    <aside class="profile-side">
        <img src="https://placehold.co/120x120/1e293b/white?text=User" id="profImg" class="profile-avatar">
        <div class="profile-info">
            <h3 id="sideName">---</h3>
            <p id="sideEmail">---</p>
        </div>
        <button class="btn btn-outline btn-full btn-sm" onclick="auth.logout()">Logout</button>
    </aside>

    <!-- Main -->
    <div class="profile-main-area">
        <div class="section-h">📝 Personal Information</div>
        <form id="profForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="profName" required>
            </div>
            <div class="form-group">
                <label>Email (Read Only)</label>
                <input type="email" id="profEmail" readonly style="background:#f8fafc; cursor:not-allowed">
            </div>
            <button type="submit" class="btn btn-primary" id="saveBtn">Save Profile</button>
        </form>

        <div class="section-h" style="margin-top:2.5rem">📅 Recent Bookings</div>
        <div id="bookingList">
            <p class="empty-state" style="padding:2rem 0">Loading your history...</p>
        </div>
    </div>
</div>

<footer>
    <div class="footer-bottom"><p>© 2026 LUXEDRIVE. All rights reserved.</p></div>
</footer>

<script src="/js/utils.js"></script>
<script src="/js/script.js"></script>
<script>
    if (!auth.requireLogin()) {}

    async function loadData() {
        try {
            // Get user info
            const res = await fetch(`${API_URL}/me`, {
                headers: { 'Authorization': `Bearer ${auth.getToken()}` }
            });
            if (res.ok) {
                const user = await res.json();
                document.getElementById('profName').value = user.name;
                document.getElementById('profEmail').value = user.email;
                document.getElementById('sideName').textContent = user.name;
                document.getElementById('sideEmail').textContent = user.email;
            }

            // Get bookings
            const bRes = await fetch(`${API_URL}/my-bookings`, {
                headers: { 'Authorization': `Bearer ${auth.getToken()}` }
            });
            const bookings = await bRes.json();
            const list = document.getElementById('bookingList');

            if (!bookings.length) {
                list.innerHTML = '<p class="empty-state">No bookings found yet.</p>';
            } else {
                list.innerHTML = bookings.map(b => `
                    <div class="booking-item">
                        <div class="booking-details">
                            <h4>${b.car_name}</h4>
                            <p>${new Date(b.start_date).toLocaleDateString()} - ${new Date(b.end_date).toLocaleDateString()}</p>
                        </div>
                        <div class="booking-status">
                            <div class="price">$${b.price_per_day}</div>
                            <span class="badge badge-${b.status}">${b.status.toUpperCase()}</span>
                        </div>
                    </div>
                `).join('');
            }
        } catch (err) {
            console.error(err);
        }
    }

    loadData();
</script>
</body>
</html>
