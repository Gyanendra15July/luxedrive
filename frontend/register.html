<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register – LUXEDRIVE</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-page">

    <div class="auth-card fade-in">
        <div class="logo" style="text-align:center; margin-bottom:.25rem; font-size:1.8rem;">LUXEDRIVE</div>
        <h2>Create Account</h2>
        <p class="subtitle">Join our exclusive community of luxury travelers</p>

        <div class="alert alert-error"   id="errMsg"></div>
        <div class="alert alert-success" id="sucMsg"></div>

        <form id="registerForm">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" required placeholder="John Doe">
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="Min 6 characters" minlength="6">
            </div>
            <div class="form-group">
                <label for="role">Account Type</label>
                <select id="role">
                    <option value="user">User – Browse & Book Cars</option>
                    <option value="admin">Admin – Manage Fleet & Bookings</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary btn-full" id="regBtn" style="margin-top:.5rem">
                Create Account
            </button>
        </form>

        <p class="auth-link">Already have an account? <a href="/login">Sign In</a></p>
        <p class="auth-link"><a href="/">← Back to Home</a></p>
    </div>

<script src="/js/utils.js"></script>
<script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn    = document.getElementById('regBtn');
        const errEl  = document.getElementById('errMsg');
        const sucEl  = document.getElementById('sucMsg');
        
        errEl.classList.remove('show');
        sucEl.classList.remove('show');

        btn.disabled    = true;
        btn.textContent = 'Creating Account…';

        const data = {
            name:     document.getElementById('name').value.trim(),
            email:    document.getElementById('email').value.trim(),
            password: document.getElementById('password').value,
            role:     document.getElementById('role').value
        };

        try {
            const res = await fetch(`${API_URL}/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await res.json();

            if (res.ok) {
                sucEl.textContent = '✅ Account created! Redirecting to login…';
                sucEl.classList.add('show');
                setTimeout(() => window.location.href = '/login', 1500);
            } else {
                errEl.textContent = '❌ ' + (result.message || 'Registration failed');
                errEl.classList.add('show');
            }
        } catch (err) {
            errEl.textContent = '❌ Connection error. Please try again.';
            errEl.classList.add('show');
        } finally {
            btn.disabled    = false;
            btn.textContent = 'Create Account';
        }
    });
</script>
</body>
</html>
