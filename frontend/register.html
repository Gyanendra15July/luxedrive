<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | LuxeDrive</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="auth-page">
    <nav>
        <div class="logo">LUXEDRIVE</div>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/login">Login</a>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card reveal">
            <h2>Create Account</h2>
            <p class="subtitle">Join LuxeDrive for a premium booking experience</p>
            <form id="registerForm">
                <div class="form-group">
                    <label for="name"><i class="fas fa-user"></i> Full Name</label>
                    <input type="text" id="name" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
                    <input type="email" id="email" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label for="mobileNumber"><i class="fas fa-phone"></i> Mobile Number</label>
                    <div class="phone-row">
                        <select id="mobileCountryCode" aria-label="Country code" required>
                            <option value="+91" selected>+91 (IN)</option>
                            <option value="+1">+1 (US)</option>
                            <option value="+44">+44 (UK)</option>
                            <option value="+971">+971 (UAE)</option>
                            <option value="+61">+61 (AU)</option>
                            <option value="+65">+65 (SG)</option>
                        </select>
                        <input type="tel" id="mobileNumber" placeholder="9876543210" inputmode="numeric" autocomplete="tel-national" required>
                    </div>
                </div>


                <button type="submit" class="btn btn-primary btn-lg full-width">Create Account</button>
            </form>
            <p class="auth-footer">Already have an account? <a href="/login">Sign In</a></p>
        </div>
    </div>

    <script src="/js/script.js"></script>
</body>
</html>
