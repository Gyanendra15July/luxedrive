<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel – LuxeDrive</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body { background: #f1f5f9; display: flex; font-family: 'Inter', system-ui, sans-serif; }
        /* Sidebar */
        .sidebar { width: 250px; min-height: 100vh; background: var(--dark); color: #fff; padding: 1.5rem 1rem; flex-shrink: 0; }
        .sidebar .logo { font-size: 1.3rem; font-weight: 800; margin-bottom: .25rem; background: linear-gradient(to right, #60a5fa, #2563eb); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sidebar .role-tag { font-size: .75rem; color: #64748b; margin-bottom: 2rem; }
        .sidebar a { display: block; padding: .7rem 1rem; color: #94a3b8; text-decoration: none; border-radius: 8px; margin-bottom: .4rem; font-weight: 500; transition: all .2s; }
        .sidebar a:hover, .sidebar a.active { background: var(--primary); color: #fff; }
        .sidebar .logout { margin-top: auto; color: #ef4444; }
        .sidebar .logout:hover { background: rgba(239,68,68,.15); color: #ef4444; }
        /* Main */
        .main { flex: 1; padding: 2rem; }
        .page-title { font-size: 1.8rem; font-weight: 800; color: var(--dark); margin-bottom: .5rem; }
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap: 1rem; margin-bottom: 2rem; }
        .stat-card  { background: #fff; border-radius: 12px; padding: 1.25rem; text-align: center; box-shadow: 0 2px 10px rgba(0,0,0,.06); }
        .stat-card .num { font-size: 2rem; font-weight: 800; color: var(--primary); }
        .stat-card .lbl { color: #64748b; font-size: .85rem; margin-top: .2rem; }
        /* Card */
        .card { background: #fff; border-radius: 16px; padding: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,.07); margin-bottom: 2rem; }
        .card h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 1.25rem; color: var(--dark); }
        /* Form */
        .add-form { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .add-form .span2 { grid-column: span 2; }
        .form-group label { display: block; font-size: .85rem; font-weight: 600; margin-bottom: .3rem; color: #475569; }
        .form-group input, .form-group textarea { width: 100%; padding: .7rem 1rem; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: .95rem; font-family: inherit; }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--primary); }
        .img-preview { width: 100%; max-height: 140px; object-fit: cover; border-radius: 8px; display: none; margin-top: .5rem; }
        .btn-add { padding: .75rem 1.5rem; background: var(--primary); color: #fff; border: none; border-radius: 8px; font-size: .95rem; font-weight: 700; cursor: pointer; transition: background .3s; }
        .btn-add:hover { background: var(--primary-dark); }
        /* Table */
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: .85rem 1rem; background: #f8fafc; color: #475569; font-size: .82rem; font-weight: 700; text-transform: uppercase; border-bottom: 2px solid #e2e8f0; }
        td { padding: .85rem 1rem; border-bottom: 1px solid #f1f5f9; font-size: .9rem; vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f8fafc; }
        .car-thumb { width: 44px; height: 44px; object-fit: cover; border-radius: 6px; }
        .badge { display: inline-block; padding: .2rem .6rem; border-radius: 20px; font-size: .75rem; font-weight: 700; }
        .badge-avail   { background: #dcfce7; color: #166534; }
        .badge-unavail { background: #fee2e2; color: #991b1b; }
        .btn-del { padding: .35rem .85rem; background: #fee2e2; color: #991b1b; border: none; border-radius: 6px; font-size: .82rem; font-weight: 700; cursor: pointer; transition: background .2s; }
        .btn-del:hover { background: #ef4444; color: #fff; }
        .empty-row td { text-align: center; padding: 2rem; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">LUXEDRIVE</div>
        <div class="role-tag">Admin Panel</div>
        <a href="/admin" class="active">🚗 Manage Cars</a>
        <a href="/manage-bookings">📋 Manage Bookings</a>
        <a href="/" class="logout" onclick="auth.logout()">🚪 Logout</a>
    </div>

    <div class="main">
        <h1 class="page-title">Fleet Management</h1>

        <!-- Stats -->
        <div class="stats-row" id="statsRow">
            <div class="stat-card"><div class="num" id="statCars">—</div><div class="lbl">Total Cars</div></div>
            <div class="stat-card"><div class="num" id="statBookings">—</div><div class="lbl">Total Bookings</div></div>
            <div class="stat-card"><div class="num" id="statUsers">—</div><div class="lbl">Total Users</div></div>
        </div>

        <!-- Add Car Form -->
        <div class="card">
            <h2>➕ Add New Car</h2>
            <form id="addCarForm" class="add-form" enctype="multipart/form-data">
                <div class="form-group">
                    <label>Car Name *</label>
                    <input type="text" id="carName" required placeholder="e.g. BMW M4">
                </div>
                <div class="form-group">
                    <label>Price Per Day ($) *</label>
                    <input type="number" id="carPrice" required placeholder="150" min="1" step="0.01">
                </div>
                <div class="form-group span2">
                    <label>Description</label>
                    <textarea id="carDesc" rows="2" placeholder="Brief description of the vehicle…"></textarea>
                </div>
                <div class="form-group">
                    <label>Car Image</label>
                    <input type="file" id="carImage" accept="image/*" onchange="previewImage(this)">
                    <img id="imgPreview" class="img-preview" alt="Preview">
                </div>
                <div class="form-group" style="display:flex;align-items:flex-end;">
                    <button type="submit" class="btn-add">Add Car to Fleet</button>
                </div>
            </form>
        </div>

        <!-- Cars Table -->
        <div class="card">
            <h2>🚗 Current Fleet</h2>
            <table>
                <thead>
                    <tr>
                        <th>Photo</th>
                        <th>Name</th>
                        <th>Price/Day</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="carTableBody">
                    <tr class="empty-row"><td colspan="5">Loading…</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="/js/utils.js"></script>
    <script>
        if (!auth.requireAdmin()) { /* redirected */ }

        // ── Stats ─────────────────────────────────────────────────────────────
        async function loadStats() {
            try {
                const res  = await fetch(`${API_URL}/admin/stats`, {
                    headers: { 'Authorization': `Bearer ${auth.getToken()}` }
                });
                if (!res.ok) return;
                const data = await res.json();
                document.getElementById('statCars').textContent     = data.total_cars;
                document.getElementById('statBookings').textContent = data.total_bookings;
                document.getElementById('statUsers').textContent    = data.total_users;
            } catch (err) { console.error('[Stats]', err); }
        }

        // ── Load Cars ─────────────────────────────────────────────────────────
        async function loadCars() {
            const tbody = document.getElementById('carTableBody');
            try {
                const res  = await fetch(`${API_URL}/cars`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const cars = await res.json();

                if (!Array.isArray(cars) || !cars.length) {
                    tbody.innerHTML = '<tr class="empty-row"><td colspan="5">No cars yet. Add one above!</td></tr>';
                    return;
                }

                tbody.innerHTML = cars.map(car => `
                    <tr>
                        <td>
                            <img class="car-thumb"
                                 src="${car.image ? '/uploads/' + car.image : 'https://placehold.co/44x44/1e293b/white?text=Car'}"
                                 alt="${car.name}"
                                 onerror="this.src='https://placehold.co/44x44/1e293b/white?text=Car'">
                        </td>
                        <td><strong>${car.name}</strong></td>
                        <td>$${car.price_per_day}</td>
                        <td><span class="badge ${car.available ? 'badge-avail' : 'badge-unavail'}">${car.available ? 'Available' : 'Unavailable'}</span></td>
                        <td><button class="btn-del" onclick="deleteCar(${car.id}, '${car.name.replace(/'/g,"\\'")}')">Delete</button></td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error('[Load Cars]', err);
                tbody.innerHTML = `<tr class="empty-row"><td colspan="5">Error: ${err.message}</td></tr>`;
            }
        }

        // ── Add Car ───────────────────────────────────────────────────────────
        document.getElementById('addCarForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('.btn-add');
            btn.disabled = true; btn.textContent = 'Adding…';

            const formData = new FormData();
            formData.append('name',         document.getElementById('carName').value.trim());
            formData.append('price_per_day',document.getElementById('carPrice').value);
            formData.append('description',  document.getElementById('carDesc').value.trim());
            const imageFile = document.getElementById('carImage').files[0];
            if (imageFile) formData.append('image', imageFile);

            try {
                const res = await fetch(`${API_URL}/cars`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${auth.getToken()}` },
                    body: formData
                });
                const data = await res.json();
                if (res.ok) {
                    alert('✅ Car added successfully!');
                    e.target.reset();
                    document.getElementById('imgPreview').style.display = 'none';
                    loadCars();
                    loadStats();
                } else {
                    alert('❌ ' + (data.message || 'Failed to add car'));
                }
            } catch (err) {
                alert('Error: ' + err.message);
            } finally {
                btn.disabled = false; btn.textContent = 'Add Car to Fleet';
            }
        });

        // ── Delete Car ────────────────────────────────────────────────────────
        async function deleteCar(id, name) {
            if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;
            try {
                const res = await fetch(`${API_URL}/cars/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${auth.getToken()}` }
                });
                if (res.ok) { loadCars(); loadStats(); }
                else { const d = await res.json(); alert('❌ ' + d.message); }
            } catch (err) { alert('Error: ' + err.message); }
        }

        // ── Image Preview ─────────────────────────────────────────────────────
        function previewImage(input) {
            const preview = document.getElementById('imgPreview');
            if (input.files && input.files[0]) {
                preview.src = URL.createObjectURL(input.files[0]);
                preview.style.display = 'block';
            }
        }

        loadStats();
        loadCars();
    </script>
</body>
</html>
