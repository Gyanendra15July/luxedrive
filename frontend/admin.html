<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - LuxeDrive</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="dashboard-layout">
        <div class="sidebar">
            <h2 class="logo">LuxeDrive Admin</h2>
            <ul class="sidebar-menu">
                <li><a href="admin.html" class="active">Manage Cars</a></li>
                <li><a href="manage-bookings.html">Manage Bookings</a></li>
                <li><a href="#" onclick="auth.logout()">Logout</a></li>
            </ul>
        </div>
        <div class="main-content">
            <header style="background:transparent; padding:0; box-shadow:none; margin-bottom:30px;">
                <h1>Manage Fleet</h1>
            </header>

            <div class="table-container" style="margin-bottom:40px;">
                <h3>Add New Car</h3>
                <form id="addCarForm" style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:20px;">
                    <div class="form-group">
                        <label>Car Name</label>
                        <input type="text" id="name" required>
                    </div>
                    <div class="form-group">
                        <label>Price Per Day ($)</label>
                        <input type="number" id="price" required>
                    </div>
                    <div class="form-group" style="grid-column: span 2;">
                        <label>Description</label>
                        <textarea id="description" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Image Upload</label>
                        <input type="file" id="image" accept="image/*">
                    </div>
                    <div class="form-group" style="display:flex; align-items:flex-end;">
                        <button type="submit" class="btn btn-primary">Add Car to Fleet</button>
                    </div>
                </form>
            </div>

            <div class="table-container">
                <h3>Current Cars</h3>
                <table style="margin-top:20px;">
                    <thead>
                        <tr>
                            <th>Image</th>
                            <th>Name</th>
                            <th>Price</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="carTableBody">
                        <!-- Cars loaded via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script>
        protectRoute(true);

        async function loadCars() {
            const res = await fetch(`${API_URL}/cars`);
            const cars = await res.json();
            const body = document.getElementById('carTableBody');
            body.innerHTML = cars.map(car => `
                <tr>
                    <td><img src="${car.image ? 'uploads/' + car.image : 'https://via.placeholder.com/50'}" style="width:50px; height:50px; object-fit:cover; border-radius:4px;"></td>
                    <td>${car.name}</td>
                    <td>$${car.price_per_day}</td>
                    <td><span class="status-badge ${car.available ? 'status-approved' : 'status-rejected'}">${car.available ? 'Available' : 'Unavailable'}</span></td>
                    <td>
                        <button class="btn btn-danger" style="width:auto; padding:5px 15px;" onclick="deleteCar(${car.id})">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        document.getElementById('addCarForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('name', document.getElementById('name').value);
            formData.append('price_per_day', document.getElementById('price').value);
            formData.append('description', document.getElementById('description').value);
            
            const imageFile = document.getElementById('image').files[0];
            if (imageFile) formData.append('image', imageFile);

            const res = await fetch(`${API_URL}/cars`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${auth.getToken()}` },
                body: formData
            });

            if (res.ok) {
                alert('Car added successfully!');
                document.getElementById('addCarForm').reset();
                loadCars();
            } else {
                alert('Error adding car');
            }
        });

        async function deleteCar(id) {
            if (!confirm('Are you sure?')) return;
            const res = await fetch(`${API_URL}/cars/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${auth.getToken()}` }
            });
            if (res.ok) loadCars();
        }

        loadCars();
    </script>
</body>
</html>
