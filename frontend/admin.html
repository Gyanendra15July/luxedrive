<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Fleet – LUXEDRIVE</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="dash-layout">

    <aside class="sidebar">
        <div class="logo">LUXEDRIVE</div>
        <div class="role-tag">Administrator</div>
        
        <nav>
            <a href="/admin" class="active"><span>🚗</span> Manage Fleet</a>
            <a href="/manage-bookings"><span>📋</span> Bookings</a>
            <a href="/dashboard"><span>👤</span> User View</a>
            <div class="spacer"></div>
            <a href="#" onclick="auth.logout()" class="danger"><span>🚪</span> Logout</a>
        </nav>
    </aside>

    <main class="dash-main">
        <header class="dash-header">
            <h1>Fleet Management</h1>
            <p>Add, update, or remove vehicles from your collection.</p>
        </header>

        <div class="stats-row" id="statsRow">
            <div class="stat-card">
                <div class="stat-icon">🏎️</div>
                <div class="stat-num" id="statCars">0</div>
                <div class="stat-lbl">Total Cars</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📅</div>
                <div class="stat-num" id="statBookings">0</div>
                <div class="stat-lbl">Total Bookings</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">👥</div>
                <div class="stat-num" id="statUsers">0</div>
                <div class="stat-lbl">Total Users</div>
            </div>
        </div>

        <div class="card">
            <h3 class="card-title">➕ Add New Vehicle</h3>
            <form id="addCarForm" enctype="multipart/form-data">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label>Vehicle Name *</label>
                        <input type="text" id="carName" required placeholder="e.g. Lamborghini Huracán">
                    </div>
                    <div class="form-group">
                        <label>Price Per Day ($) *</label>
                        <input type="number" id="carPrice" required placeholder="999" min="1">
                    </div>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="carDesc" placeholder="Enter vehicle specifications and details..."></textarea>
                </div>
                <div class="form-group">
                    <label>Vehicle Photo</label>
                    <input type="file" id="carImage" accept="image/*" onchange="previewImage(this)">
                    <img id="imgPreview" class="img-preview">
                </div>
                <button type="submit" class="btn btn-primary" id="addBtn">Add Vehicle to Fleet</button>
            </form>
        </div>

        <div class="card">
            <h3 class="card-title">🏎️ Existing Fleet</h3>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Photo</th>
                            <th>Name</th>
                            <th>Price/Day</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="carTableBody">
                        <tr><td colspan="5" class="empty-state">Loading fleet data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

<script src="/js/utils.js"></script>
<script>
    if (!auth.requireAdmin()) {}

    async function loadAdminStats() {
        try {
            const res = await fetch(`${API_URL}/admin/stats`, {
                headers: { 'Authorization': `Bearer ${auth.getToken()}` }
            });
            if (res.ok) {
                const data = await res.json();
                document.getElementById('statCars').textContent = data.total_cars;
                document.getElementById('statBookings').textContent = data.total_bookings;
                document.getElementById('statUsers').textContent = data.total_users;
            }
        } catch (err) { console.error('Stats error:', err); }
    }

    async function loadFleet() {
        const tbody = document.getElementById('carTableBody');
        try {
            const res = await fetch(`${API_URL}/cars`);
            const cars = await res.json();

            if (!cars.length) {
                tbody.innerHTML = '<tr><td colspan="5" class="empty-state">No vehicles in fleet.</td></tr>';
                return;
            }

            tbody.innerHTML = cars.map(car => `
                <tr>
                    <td><img src="${car.image ? '/uploads/'+car.image : 'https://placehold.co/46x40/1e293b/white?text=Car'}" class="tbl-img"></td>
                    <td><strong>${car.name}</strong></td>
                    <td>$${car.price_per_day}</td>
                    <td><span class="badge ${car.available ? 'badge-avail' : 'badge-unavail'}">${car.available ? 'Available' : 'In Use'}</span></td>
                    <td>
                        <button class="btn btn-danger btn-sm" onclick="deleteCar(${car.id})">Delete</button>
                    </td>
                </tr>
            `).join('');
        } catch (err) {
            tbody.innerHTML = '<tr><td colspan="5" class="empty-state">Error loading fleet.</td></tr>';
        }
    }

    document.getElementById('addCarForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('addBtn');
        btn.disabled = true; btn.textContent = 'Adding...';

        const formData = new FormData();
        formData.append('name', document.getElementById('carName').value);
        formData.append('price_per_day', document.getElementById('carPrice').value);
        formData.append('description', document.getElementById('carDesc').value);
        const img = document.getElementById('carImage').files[0];
        if (img) formData.append('image', img);

        try {
            const res = await fetch(`${API_URL}/cars`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${auth.getToken()}` },
                body: formData
            });
            if (res.ok) {
                alert('Vehicle added successfully!');
                e.target.reset();
                document.getElementById('imgPreview').style.display = 'none';
                loadFleet();
                loadAdminStats();
            } else {
                const d = await res.json();
                alert(d.message || 'Error adding vehicle');
            }
        } catch (err) { alert('Connection error'); }
        finally { btn.disabled = false; btn.textContent = 'Add Vehicle to Fleet'; }
    });

    async function deleteCar(id) {
        if (!confirm('Are you sure you want to remove this vehicle?')) return;
        try {
            const res = await fetch(`${API_URL}/cars/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${auth.getToken()}` }
            });
            if (res.ok) { loadFleet(); loadAdminStats(); }
            else alert('Error deleting vehicle');
        } catch (err) { alert('Connection error'); }
    }

    function previewImage(input) {
        const preview = document.getElementById('imgPreview');
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                preview.src = e.target.result;
                preview.style.display = 'block';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    loadAdminStats();
    loadFleet();
</script>
</body>
</html>
