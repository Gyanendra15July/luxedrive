<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – LuxeDrive</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--dark); }
        .auth-box { background: var(--white); padding: 2.5rem; border-radius: 16px; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
        .auth-box h2 { text-align: center; margin-bottom: 1.5rem; font-size: 1.8rem; color: var(--dark); }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; margin-bottom: .4rem; font-weight: 600; font-size: .9rem; color: var(--secondary); }
        .form-group input, .form-group select { width: 100%; padding: .75rem 1rem; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 1rem; transition: border-color .3s; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--primary); }
        .btn { width: 100%; padding: .85rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all .3s; }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
        .auth-link { text-align: center; margin-top: 1rem; font-size: .9rem; color: var(--secondary); }
        .auth-link a { color: var(--primary); text-decoration: none; font-weight: 600; }
        .error-msg { background: #fee2e2; color: #991b1b; padding: .75rem 1rem; border-radius: 8px; font-size: .9rem; margin-bottom: 1rem; display: none; }
    </style>
</head>
<body>
    <div class="auth-box">
        <h2>🚗 Sign In</h2>
        <div class="error-msg" id="errorMsg"></div>
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary" id="loginBtn">Sign In</button>
        </form>
        <p class="auth-link">Don't have an account? <a href="/register">Register here</a></p>
        <p class="auth-link" style="margin-top:.5rem"><a href="/">← Back to Home</a></p>
    </div>

    <script src="/js/utils.js"></script>
    <script>
        // Redirect if already logged in
        if (auth.isLoggedIn()) {
            window.location.href = auth.isAdmin() ? '/admin' : '/dashboard';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errEl = document.getElementById('errorMsg');
            btn.disabled = true;
            btn.textContent = 'Signing in…';
            errEl.style.display = 'none';

            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            try {
                const res  = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (res.ok) {
                    auth.setSession(data.user, data.token);
                    window.location.href = data.user.role === 'admin' ? '/admin' : '/dashboard';
                } else {
                    errEl.textContent    = data.message || 'Login failed';
                    errEl.style.display  = 'block';
                }
            } catch (err) {
                errEl.textContent   = 'Connection error. Is the server running?';
                errEl.style.display = 'block';
            } finally {
                btn.disabled    = false;
                btn.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
