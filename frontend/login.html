<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In – LUXEDRIVE</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-page">

    <div class="auth-card fade-in">
        <div class="logo" style="text-align:center; margin-bottom:.25rem; font-size:1.8rem;">LUXEDRIVE</div>
        <h2>Welcome Back</h2>
        <p class="subtitle">Sign in to your account to continue</p>

        <div class="alert alert-error"   id="errMsg"></div>
        <div class="alert alert-success" id="sucMsg"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="you@example.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary btn-full" id="loginBtn" style="margin-top:.5rem">
                Sign In
            </button>
        </form>

        <p class="auth-link">Don't have an account? <a href="/register">Create one free</a></p>
        <p class="auth-link"><a href="/">← Back to Home</a></p>
    </div>

<script src="/js/utils.js"></script>
<script>
    // Redirect if already signed in
    if (auth.isLoggedIn()) {
        window.location.href = auth.isAdmin() ? '/admin' : '/dashboard';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn    = document.getElementById('loginBtn');
        const errEl  = document.getElementById('errMsg');
        const sucEl  = document.getElementById('sucMsg');
        errEl.className = 'alert alert-error';
        sucEl.className = 'alert alert-success';

        btn.disabled    = true;
        btn.textContent = 'Signing in…';

        try {
            const res  = await fetch(`${API_URL}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email:    document.getElementById('email').value.trim(),
                    password: document.getElementById('password').value
                })
            });
            const data = await res.json();

            if (res.ok) {
                auth.setSession(data.user, data.token);
                sucEl.textContent = '✅ Login successful! Redirecting…';
                sucEl.classList.add('show');
                setTimeout(() => {
                    window.location.href = data.user.role === 'admin' ? '/admin' : '/dashboard';
                }, 600);
            } else {
                errEl.textContent = '❌ ' + (data.message || 'Login failed');
                errEl.classList.add('show');
            }
        } catch (err) {
            errEl.textContent = '❌ Connection error. Is the server running?';
            errEl.classList.add('show');
        } finally {
            btn.disabled    = false;
            btn.textContent = 'Sign In';
        }
    });
</script>
</body>
</html>
