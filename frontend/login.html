<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | LuxeDrive</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="auth-page">
    <nav>
        <div class="logo">LUXEDRIVE</div>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/register">Register</a>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card reveal">
            <h2>Welcome Back</h2>
            <p class="subtitle">Enter your credentials to access your account</p>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
                    <input type="email" id="email" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg full-width">Sign In</button>
            </form>
            <p class="auth-footer">Don't have an account? <a href="/register">Create one</a></p>
        </div>
    </div>

    <script src="/js/script.js"></script>
</body>
</html>
