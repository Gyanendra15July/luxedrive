<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - LuxeDrive</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container nav">
            <div class="logo">LuxeDrive</div>
            <ul>
                <li><a href="dashboard.html" class="active">Browse Cars</a></li>
                <li><a href="bookings.html">My Bookings</a></li>
                <li><a href="#" onclick="auth.logout()">Logout</a></li>
            </ul>
        </div>
    </header>

    <div class="container">
        <h1 style="margin-top: 40px;">Available Cars</h1>
        <div class="car-grid" id="carGrid">
            <!-- Cars will be loaded here -->
        </div>
    </div>

    <!-- Booking Modal -->
    <div id="bookingModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center;">
        <div style="background:white; padding:40px; border-radius:12px; width:400px;">
            <h3>Book <span id="modalCarName"></span></h3>
            <form id="bookingForm" style="margin-top:20px;">
                <input type="hidden" id="modalCarId">
                <div class="form-group">
                    <label>Start Date</label>
                    <input type="date" id="startDate" required>
                </div>
                <div class="form-group">
                    <label>End Date</label>
                    <input type="date" id="endDate" required>
                </div>
                <button type="submit" class="btn btn-primary">Confirm Booking</button>
                <button type="button" class="btn" onclick="closeModal()" style="margin-top:10px;">Cancel</button>
            </form>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script>
        protectRoute();

        async function loadCars() {
            const res = await fetch(`${API_URL}/cars`);
            const cars = await res.json();
            const grid = document.getElementById('carGrid');
            grid.innerHTML = cars.map(car => `
                <div class="car-card">
                    <img src="${car.image ? 'uploads/' + car.image : 'https://via.placeholder.com/300x200?text=No+Image'}" class="car-image" alt="${car.name}">
                    <div class="car-info">
                        <div class="car-name">${car.name}</div>
                        <div class="car-price">$${car.price_per_day} / day</div>
                        <div class="car-desc">${car.description || 'No description available.'}</div>
                        <button class="btn btn-primary" onclick="openBooking(${car.id}, '${car.name}')" ${!car.available ? 'disabled' : ''}>
                            ${car.available ? 'Book Now' : 'Currently Unavailable'}
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function openBooking(id, name) {
            document.getElementById('modalCarId').value = id;
            document.getElementById('modalCarName').innerText = name;
            document.getElementById('bookingModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('bookingModal').style.display = 'none';
        }

        document.getElementById('bookingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                car_id: document.getElementById('modalCarId').value,
                start_date: document.getElementById('startDate').value,
                end_date: document.getElementById('endDate').value
            };

            const res = await fetch(`${API_URL}/book`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${auth.getToken()}`
                },
                body: JSON.stringify(data)
            });

            if (res.ok) {
                alert('Booking request sent successfully!');
                closeModal();
            } else {
                alert('Failed to book. Please try again.');
            }
        });

        loadCars();
    </script>
</body>
</html>
