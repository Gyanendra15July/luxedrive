<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard – LuxeDrive</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body { background: #f1f5f9; }
        .top-bar { background: var(--dark); color: #fff; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .top-bar .logo { font-size: 1.4rem; font-weight: 800; background: linear-gradient(to right, #60a5fa, #2563eb); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .top-bar nav a { color: #cbd5e1; text-decoration: none; margin-left: 1.5rem; font-weight: 500; transition: color .3s; }
        .top-bar nav a:hover { color: #fff; }
        .top-bar nav a.active { color: #60a5fa; }
        .hero-bar { background: linear-gradient(135deg, #1e3a5f, #2563eb); color: #fff; padding: 2rem; text-align: center; }
        .hero-bar h1 { font-size: 1.8rem; margin-bottom: .25rem; }
        .hero-bar p  { color: #bfdbfe; }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; }
        .search-row { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .search-row input, .search-row select { padding: .7rem 1rem; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: .95rem; }
        .search-row input { flex: 1; min-width: 180px; }
        .search-row input:focus, .search-row select:focus { outline: none; border-color: var(--primary); }
        .car-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
        .car-card { background: #fff; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,.07); transition: transform .3s, box-shadow .3s; }
        .car-card:hover { transform: translateY(-5px); box-shadow: 0 12px 30px rgba(0,0,0,.12); }
        .car-card img { width: 100%; height: 190px; object-fit: cover; }
        .car-info { padding: 1.2rem; }
        .car-info h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: .4rem; color: var(--dark); }
        .car-price { color: var(--primary); font-weight: 700; font-size: 1.05rem; margin-bottom: .5rem; }
        .car-desc  { font-size: .82rem; color: #64748b; margin-bottom: 1rem; height: 2.6rem; overflow: hidden; }
        .badge { display: inline-block; padding: .2rem .7rem; border-radius: 20px; font-size: .75rem; font-weight: 700; margin-bottom: .8rem; }
        .badge-avail   { background: #dcfce7; color: #166534; }
        .badge-unavail { background: #fee2e2; color: #991b1b; }
        .btn-book { display: block; width: 100%; padding: .7rem; background: var(--primary); color: #fff; border: none; border-radius: 8px; font-size: .95rem; font-weight: 700; cursor: pointer; transition: background .3s; }
        .btn-book:hover   { background: var(--primary-dark); }
        .btn-book:disabled { background: #94a3b8; cursor: not-allowed; }
        /* Modal */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 1000; align-items: center; justify-content: center; }
        .modal-overlay.open { display: flex; }
        .modal-box { background: #fff; border-radius: 16px; padding: 2rem; width: 100%; max-width: 420px; position: relative; }
        .modal-box h3 { font-size: 1.3rem; margin-bottom: 1.2rem; }
        .modal-box .form-group { margin-bottom: 1rem; }
        .modal-box label { display: block; font-size: .85rem; font-weight: 600; margin-bottom: .3rem; color: #475569; }
        .modal-box input  { width: 100%; padding: .65rem 1rem; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: .95rem; }
        .modal-box input:focus { outline: none; border-color: var(--primary); }
        .modal-total { font-size: 1.1rem; font-weight: 700; color: var(--primary); margin: .8rem 0 1.2rem; }
        .modal-btns { display: flex; gap: .75rem; }
        .modal-btns .btn-confirm { flex: 1; padding: .75rem; background: var(--primary); color: #fff; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; }
        .modal-btns .btn-cancel  { flex: 1; padding: .75rem; background: #f1f5f9; color: #475569; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; }
        .empty-state { text-align: center; padding: 4rem 1rem; color: #64748b; grid-column: 1/-1; }
        .empty-state h3 { font-size: 1.4rem; margin-bottom: .5rem; }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="logo">LUXEDRIVE</div>
        <nav>
            <a href="/dashboard" class="active">Browse Cars</a>
            <a href="/bookings">My Bookings</a>
            <a href="/profile">Profile</a>
            <a href="#" onclick="auth.logout()">Logout</a>
        </nav>
    </div>

    <div class="hero-bar">
        <h1>Welcome back, <span id="userName">—</span>!</h1>
        <p>Find and book your perfect luxury vehicle</p>
    </div>

    <div class="container">
        <div class="search-row">
            <input type="text" id="searchInput" placeholder="🔍 Search cars…">
            <select id="priceFilter">
                <option value="all">All Prices</option>
                <option value="low">Under $100/day</option>
                <option value="mid">$100–$200/day</option>
                <option value="high">Above $200/day</option>
            </select>
        </div>

        <div class="car-grid" id="carGrid">
            <div class="empty-state"><p>Loading available cars…</p></div>
        </div>
    </div>

    <!-- Booking Modal -->
    <div class="modal-overlay" id="bookingModal">
        <div class="modal-box">
            <h3>Book: <span id="modalCarName"></span></h3>
            <input type="hidden" id="modalCarId">
            <input type="hidden" id="modalCarPrice">
            <div class="form-group">
                <label>Start Date</label>
                <input type="date" id="startDate" required>
            </div>
            <div class="form-group">
                <label>End Date</label>
                <input type="date" id="endDate" required>
            </div>
            <div class="modal-total" id="priceEstimate"></div>
            <div class="modal-btns">
                <button class="btn-confirm" id="confirmBtn" onclick="confirmBooking()">Confirm Booking</button>
                <button class="btn-cancel"  onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script src="/js/utils.js"></script>
    <script>
        // Gate: must be logged in
        if (!auth.requireLogin()) { /* redirected */ }

        document.getElementById('userName').textContent = localStorage.getItem('name') || 'User';

        let allCars = [];

        async function loadCars() {
            const grid = document.getElementById('carGrid');
            try {
                const res  = await fetch(`${API_URL}/cars`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const cars = await res.json();

                if (!Array.isArray(cars)) throw new Error('Invalid response');
                allCars = cars;
                applyFilters();
            } catch (err) {
                console.error('[Load Cars]', err);
                grid.innerHTML = `<div class="empty-state"><h3>⚠ Error Loading Cars</h3><p>${err.message}. Please refresh.</p></div>`;
            }
        }

        function applyFilters() {
            const term  = document.getElementById('searchInput').value.toLowerCase();
            const price = document.getElementById('priceFilter').value;

            const filtered = allCars.filter(c => {
                const matchTerm = !term || c.name.toLowerCase().includes(term) || (c.description||'').toLowerCase().includes(term);
                const p = parseFloat(c.price_per_day);
                const matchPrice = price === 'all' ||
                    (price === 'low' && p < 100) ||
                    (price === 'mid' && p >= 100 && p <= 200) ||
                    (price === 'high' && p > 200);
                return matchTerm && matchPrice;
            });

            renderCars(filtered);
        }

        function renderCars(cars) {
            const grid = document.getElementById('carGrid');
            if (!cars.length) {
                grid.innerHTML = '<div class="empty-state"><h3>No Cars Found</h3><p>Try different filters.</p></div>';
                return;
            }
            grid.innerHTML = cars.map(car => `
                <div class="car-card">
                    <img src="${car.image ? '/uploads/' + car.image : 'https://placehold.co/400x250/1e293b/white?text=' + encodeURIComponent(car.name)}"
                         alt="${car.name}"
                         onerror="this.src='https://placehold.co/400x250/1e293b/white?text=Car'">
                    <div class="car-info">
                        <h3>${car.name}</h3>
                        <div class="car-price">$${car.price_per_day} / day</div>
                        <p class="car-desc">${car.description || 'Premium vehicle ready for booking.'}</p>
                        <span class="badge ${car.available ? 'badge-avail' : 'badge-unavail'}">
                            ${car.available ? '✓ Available' : '✗ Unavailable'}
                        </span>
                        <button class="btn-book" onclick="openBooking(${car.id}, '${car.name.replace(/'/g,"\\'")}', ${car.price_per_day})"
                            ${!car.available ? 'disabled' : ''}>
                            ${car.available ? 'Book Now' : 'Unavailable'}
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // ── Modal ────────────────────────────────────────────────────────────
        function openBooking(id, name, price) {
            document.getElementById('modalCarId').value    = id;
            document.getElementById('modalCarName').textContent = name;
            document.getElementById('modalCarPrice').value = price;
            document.getElementById('startDate').value     = '';
            document.getElementById('endDate').value       = '';
            document.getElementById('priceEstimate').textContent = '';
            document.getElementById('bookingModal').classList.add('open');
        }

        function closeModal() {
            document.getElementById('bookingModal').classList.remove('open');
        }

        // Auto-calculate price
        ['startDate','endDate'].forEach(id => {
            document.getElementById(id).addEventListener('change', () => {
                const start = document.getElementById('startDate').value;
                const end   = document.getElementById('endDate').value;
                const price = parseFloat(document.getElementById('modalCarPrice').value);
                if (start && end) {
                    const days = Math.ceil((new Date(end) - new Date(start)) / 86400000);
                    if (days > 0) {
                        document.getElementById('priceEstimate').textContent =
                            `Estimated Total: $${(days * price).toFixed(2)} (${days} day${days>1?'s':''})`;
                    } else {
                        document.getElementById('priceEstimate').textContent = '⚠ End date must be after start date';
                    }
                }
            });
        });

        async function confirmBooking() {
            const car_id     = document.getElementById('modalCarId').value;
            const start_date = document.getElementById('startDate').value;
            const end_date   = document.getElementById('endDate').value;

            if (!start_date || !end_date) return alert('Please select both dates.');
            if (end_date <= start_date)   return alert('End date must be after start date.');

            const btn = document.getElementById('confirmBtn');
            btn.disabled = true; btn.textContent = 'Submitting…';

            try {
                const res = await fetch(`${API_URL}/book`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${auth.getToken()}`
                    },
                    body: JSON.stringify({ car_id, start_date, end_date })
                });
                const data = await res.json();

                if (res.ok) {
                    closeModal();
                    alert('✅ Booking submitted! Status: Pending Admin Approval.');
                } else {
                    alert('❌ ' + (data.message || 'Booking failed'));
                }
            } catch (err) {
                alert('Connection error: ' + err.message);
            } finally {
                btn.disabled = false; btn.textContent = 'Confirm Booking';
            }
        }

        document.getElementById('searchInput').addEventListener('input', applyFilters);
        document.getElementById('priceFilter').addEventListener('change', applyFilters);

        loadCars();
    </script>
</body>
</html>
